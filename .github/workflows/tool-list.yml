name: Update tool list

# Keep the README Tools tables in sync with the source. The generator runs the
# addon's tool-registration code headlessly (MoonSharp, no game) and reflects the
# .NET host tools, then rewrites the <!-- TOOLS:* --> table blocks. Any change is
# auto-committed.
#
# The push uses secrets.GENERATE_DOCS_TOKEN (a bypassing identity), not the default GITHUB_TOKEN:
# the branch ruleset only lets admins / the bypass app push to the default branch,
# and a GITHUB_TOKEN push is rejected ("must be made through a pull request"). The
# auto-commit only touches README.md, which isn't a trigger path below, so it can't
# re-trigger this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'lua/mcp/**'
      - 'server/GModMcpServer/Host/**'
      - 'server/GModMcpServer.ToolList/**'
      - '.github/workflows/tool-list.yml'
  workflow_dispatch:

jobs:
  regenerate:
    name: Update tool list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GENERATE_DOCS_TOKEN }}

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Regenerate
        run: dotnet run --project server/GModMcpServer.ToolList -c Release

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: Update tool list
          file_pattern: README.md
