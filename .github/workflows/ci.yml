name: CI

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run glua_check
        shell: pwsh
        run: ./scripts/glua-check.ps1

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GMod-MCP-Server.sln

      - name: Build
        run: dotnet build GMod-MCP-Server.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GModMcpServer.Tests/GModMcpServer.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
