name: CI

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run glua_check
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif
          category: glua_check

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GMod-MCP-Server.sln

      - name: Build
        run: dotnet build GMod-MCP-Server.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GModMcpServer.Tests/GModMcpServer.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
