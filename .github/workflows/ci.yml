name: CI

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run glua_check
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: results.sarif
          category: glua_check

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GMod-MCP-Server.sln

      - name: Build
        run: dotnet build GMod-MCP-Server.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GModMcpServer.Tests/GModMcpServer.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
