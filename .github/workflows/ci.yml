name: CI

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: GMod-MCP-Server

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.26.1
          path: gmod-addon-tools

      - name: Run glua_check
        working-directory: GMod-MCP-Server
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('GMod-MCP-Server/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: GMod-MCP-Server/results.sarif
          checkout_path: ${{ github.workspace }}/GMod-MCP-Server
          category: glua_check

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GMod-MCP-Server.sln

      - name: Build
        run: dotnet build GMod-MCP-Server.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test server/GModMcpServer.Tests/GModMcpServer.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
